<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── SEO ── -->
    <title>ElectGuide — AI-Powered Election Process Assistant</title>
    <meta name="description" content="Understand elections, voting, and democracy with an AI-powered interactive guide. Step-by-step wizard, visual timeline, knowledge quiz, and polling station finder." />
    <meta name="theme-color" content="#4F46E5" />

    <!-- ── Security meta tags ── -->
    <!-- CSP is also enforced via HTTP headers (firebase.json + SecurityHeadersMiddleware) -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />

    <!-- ── Favicon ── -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗳️</text></svg>" />

    <!-- ── Google Fonts (DM Sans) ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..800;1,9..40,300..800&display=swap"
      rel="stylesheet"
    />

    <!-- ── Google Analytics 4 ──
         Integration rationale: track which election topics users ask about most,
         wizard drop-off points, and language/theme preferences.
         Measurement ID sourced from environment variable (VITE_GA4_MEASUREMENT_ID).
         @integration Google Analytics 4
    -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=%VITE_GA4_MEASUREMENT_ID%"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() { dataLayer.push(arguments); }
      gtag('js', new Date());
      gtag('config', '%VITE_GA4_MEASUREMENT_ID%', {
        // Privacy: disable advertising features
        allow_google_signals: false,
        allow_ad_personalization_signals: false,
      });
    </script>

    <style>
      /* Critical CSS — prevents flash of unstyled content */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { height: 100%; overflow: hidden; }
      body {
        font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
        background: #F1F5F9;
        color: #0F172A;
        -webkit-font-smoothing: antialiased;
      }
      /* Loading placeholder shown before React mounts */
      #root:empty::after {
        content: '';
        display: block;
        width: 36px;
        height: 36px;
        margin: 48vh auto 0;
        border: 3px solid #4F46E5;
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin .8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <!-- Accessible skip-to-content link for keyboard users -->
    <a
      href="#main-content"
      style="position:absolute;left:-9999px;top:0;z-index:9999;padding:8px 16px;background:#4F46E5;color:#fff;border-radius:0 0 8px 0;font-size:14px;"
      onfocus="this.style.left='0'"
      onblur="this.style.left='-9999px'"
    >
      Skip to main content
    </a>

    <div id="root"></div>

    <!-- React app entry point -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
